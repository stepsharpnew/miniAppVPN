version: "3.8"

# Dev overlay: no local Postgres — bot connects to production DB via SSH tunnel
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    profiles: ["production-only"]

  db-migrator:
    profiles: ["production-only"]

  bot:
    depends_on: {}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-meme}:${POSTGRES_PASSWORD:-meme_secret}@host.docker.internal:5432/${POSTGRES_DB:-meme_db}"
