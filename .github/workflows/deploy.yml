name: CI/CD — Full Stack Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  # ── 1. Lint & type-check bot ────────────────────────────────
  check-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bot

      - name: TypeScript check (bot)
        run: npm run bot:check
        working-directory: bot

  # ── 2. Build & deploy everything via docker-compose ─────────
  deploy:
    runs-on: ubuntu-latest
    needs: check-bot
    environment: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || 'DEVELOPMENT' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate SSH key secret
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SSH_KEY}" ]; then
            echo "::error::SSH private key secret is missing for selected environment."
            echo "::error::Set DEPLOY_SSH_KEY (or SSH_PRIVATE_KEY) in PRODUCTION and DEVELOPMENT environments."
            exit 1
          fi

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_SSH_KEY || secrets.SSH_PRIVATE_KEY }}

      - name: Create DB SSH tunnel on dev server
        if: github.ref == 'refs/heads/dev'
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            set -euo pipefail
            if [ ! -f /root/shalos_bot.txt ]; then
              echo "Tunnel key /root/shalos_bot.txt not found"
              exit 1
            fi
            if pgrep -f "127.0.0.1:5432:localhost:5432" >/dev/null 2>&1; then
              echo "DB tunnel already running, skip start"
            else
              nohup ssh -fN \
                -L 127.0.0.1:5432:localhost:5432 \
                -o ExitOnForwardFailure=yes \
                -o ServerAliveInterval=60 \
                -o ServerAliveCountMax=3 \
                -o StrictHostKeyChecking=no \
                -i /root/shalos_bot.txt \
                root@103.31.76.160 >/tmp/dev-db-tunnel.log 2>&1
              echo "Tunnel started: 127.0.0.1:5432 -> 103.31.76.160:5432"
            fi
          ENDSSH

      - name: Ensure Docker on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER
            fi
            docker --version
            docker compose version
          ENDSSH

      - name: Deploy project files to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "mkdir -p ~/meme_bot"
          rsync -avz --delete \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude=".vercel" \
            --exclude="__pycache__" \
            ./ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }}:~/meme_bot/

      # DOTENV via echo '...' breaks on quotes/newlines in values. Pipe from runner env instead.
      - name: Create .env on server
        env:
          DOTENV_CONTENT: ${{ secrets.DOTENV }}
        run: |
          if [ -z "${DOTENV_CONTENT}" ]; then
            echo "::error::Secret DOTENV is empty or not set for selected environment."
            exit 1
          fi
          printf '%s\n' "$DOTENV_CONTENT" | ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "tee ~/meme_bot/.env ~/meme_bot/bot/.env > /dev/null"

      - name: Build and restart services
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            set -euo pipefail
            cd ~/meme_bot
            docker compose --env-file .env config > /dev/null
            docker compose pull postgres
            docker compose build --no-cache bot nginx
            docker compose up -d --remove-orphans
            for i in {1..30}; do
              if docker compose exec -T postgres pg_isready -U "${POSTGRES_USER:-meme}" -d "${POSTGRES_DB:-meme_db}" > /dev/null 2>&1; then
                echo "Postgres is ready"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Postgres failed to become ready in time"
                exit 1
              fi
              sleep 2
            done
            docker compose exec -T postgres psql -v ON_ERROR_STOP=1 -U "${POSTGRES_USER:-meme}" -d "${POSTGRES_DB:-meme_db}" < create_tables.sql
            docker compose ps
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            cd ~/meme_bot
            echo "=== Container status ==="
            docker compose ps
            echo ""
            echo "=== Postgres health ==="
            docker compose exec -T postgres pg_isready -U ${POSTGRES_USER:-meme} || echo "Postgres not ready yet"
            echo ""
            echo "=== Bot logs (last 10 lines) ==="
            docker compose logs --tail=10 bot
          ENDSSH
