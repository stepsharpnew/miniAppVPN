name: CI/CD — Full Stack Deploy

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: "Куда деплоить вручную"
        type: choice
        required: true
        default: preprod
        options:
          - preprod
          - prod
      force_migrate:
        description: "Принудительно запустить create_tables.sql"
        type: boolean
        default: false
      force_rebuild_nginx:
        description: "Принудительно пересобрать nginx (Mini App статика)"
        type: boolean
        default: false

jobs:
  # ── 1. Lint & type-check bot (общий для prod и preprod) ─────
  check-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bot

      - name: TypeScript check (bot)
        run: npm run bot:check
        working-directory: bot

  # ── 2a. PROD: деплой при push в main → app.memeinternet.site ─
  deploy-prod:
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod')
    runs-on: ubuntu-latest
    needs: check-bot
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED="ALL"
          fi
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(nginx\.conf|nginx/|bot/webapp/|website/)'; then
            echo "rebuild_nginx=true" >> $GITHUB_OUTPUT
          else
            echo "rebuild_nginx=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^create_tables\.sql$'; then
            echo "run_migrator=true" >> $GITHUB_OUTPUT
          else
            echo "run_migrator=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Ensure Docker on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER
            fi
            docker --version
            docker compose version
          ENDSSH

      - name: Deploy project files to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "mkdir -p ~/meme_bot ~/meme_bot/webapp-preprod/dist"
          rsync -avz --delete \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude=".env.preprod" \
            --exclude=".vercel" \
            --exclude="__pycache__" \
            --exclude="webapp-preprod" \
            ./ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }}:~/meme_bot/

      # DOTENV via echo '...' breaks on quotes/newlines in values. Pipe from runner env instead.
      - name: Create .env on server
        env:
          DOTENV_CONTENT: ${{ secrets.DOTENV }}
        run: |
          if [ -z "${DOTENV_CONTENT}" ]; then
            echo "::error::Secret DOTENV is empty or not set (Repo → Settings → Secrets and variables → Actions)."
            exit 1
          fi
          printf '%s\n' "$DOTENV_CONTENT" | ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "tee ~/meme_bot/.env ~/meme_bot/bot/.env > /dev/null"

      - name: Ensure ports 80/443 are free (first-run / drift guard)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            set -euo pipefail
            # Если edge-nginx уже работает — порты заняты ИМ, ничего не освобождаем.
            if docker ps --format '{{.Names}}' | grep -q '^edge-nginx$'; then
              echo "edge-nginx already running — skipping host port cleanup"
              exit 0
            fi
            if command -v systemctl >/dev/null 2>&1; then
              for svc in nginx apache2 httpd caddy traefik lighttpd haproxy; do
                if ! systemctl cat "${svc}.service" >/dev/null 2>&1; then
                  continue
                fi
                echo "Disabling+masking host service ${svc}"
                sudo systemctl stop "${svc}.service" 2>/dev/null || true
                sudo systemctl disable "${svc}.service" 2>/dev/null || true
                sudo systemctl mask "${svc}.service" 2>/dev/null || true
              done
            fi
            for port in 80 443; do
              conflicting=$(docker ps --filter "publish=${port}" --format '{{.ID}} {{.Names}}' || true)
              if [ -n "$conflicting" ]; then
                echo "Containers holding host port ${port}:"
                echo "$conflicting"
                docker stop $(echo "$conflicting" | awk '{print $1}') || true
              fi
            done
            for port in 80 443; do
              if command -v fuser >/dev/null 2>&1; then
                sudo fuser -k "${port}/tcp" 2>/dev/null || true
              else
                pids=$(sudo ss -ltnp "sport = :${port}" 2>/dev/null | sed -n 's/.*pid=\([0-9][0-9]*\).*/\1/p' | sort -u)
                for pid in $pids; do
                  sudo kill -TERM "$pid" 2>/dev/null || true
                done
                sleep 1
                pids=$(sudo ss -ltnp "sport = :${port}" 2>/dev/null | sed -n 's/.*pid=\([0-9][0-9]*\).*/\1/p' | sort -u)
                for pid in $pids; do
                  sudo kill -KILL "$pid" 2>/dev/null || true
                done
              fi
            done
            sleep 2
            for port in 80 443; do
              if command -v ss >/dev/null 2>&1; then
                holder=$(sudo ss -ltnp "( sport = :${port} )" 2>/dev/null | awk 'NR>1')
              else
                holder=$(sudo lsof -iTCP:${port} -sTCP:LISTEN -n -P 2>/dev/null || true)
              fi
              if [ -n "$holder" ]; then
                echo "::error::Host port ${port} is still occupied by:"
                echo "$holder"
                exit 1
              fi
            done
          ENDSSH

      - name: Build and (re)start services — minimal downtime
        env:
          REBUILD_NGINX: ${{ steps.changes.outputs.rebuild_nginx }}
          RUN_MIGRATOR: ${{ steps.changes.outputs.run_migrator }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            REBUILD_NGINX="${REBUILD_NGINX}" RUN_MIGRATOR="${RUN_MIGRATOR}" bash << 'ENDSSH'
            set -euo pipefail
            cd ~/meme_bot

            # Bind-mount папка preprod-фронта (см. docker-compose nginx.volumes).
            # На prod может ещё не существовать — создаём пустую, чтобы compose не падал.
            mkdir -p ~/meme_bot/webapp-preprod/dist

            docker compose --env-file .env config > /dev/null

            # Postgres — поднять, если ещё не запущен. up -d идемпотентен.
            docker compose --env-file .env up -d postgres
            for i in {1..30}; do
              if docker compose exec -T postgres pg_isready -U "${POSTGRES_USER:-meme}" -d "${POSTGRES_DB:-meme_db}" > /dev/null 2>&1; then
                break
              fi
              [ "$i" -eq 30 ] && { echo "Postgres failed to become ready"; exit 1; }
              sleep 2
            done

            # Миграции — только если поменялся create_tables.sql.
            if [ "${RUN_MIGRATOR}" = "true" ]; then
              echo "Running create_tables.sql"
              docker compose exec -T postgres psql -v ON_ERROR_STOP=1 \
                -U "${POSTGRES_USER:-meme}" -d "${POSTGRES_DB:-meme_db}" < create_tables.sql
            fi

            # Bot (prod) — ребилд с layer cache, перезапуск только этого сервиса.
            docker compose --env-file .env build bot
            docker compose --env-file .env up -d --no-deps bot

            # Nginx — пересобирать только при изменениях фронта/конфига или если ещё не запущен.
            # --force-recreate обязателен: nginx.conf смонтирован как single-file bind-mount,
            # после rsync на хосте у файла новый inode, а контейнер держит старый. Пересоздание
            # контейнера перепривязывает маунт к актуальному inode.
            if [ "${REBUILD_NGINX}" = "true" ] || ! docker ps --format '{{.Names}}' | grep -q '^edge-nginx$'; then
              echo "Rebuilding nginx (REBUILD_NGINX=${REBUILD_NGINX})"
              docker compose --env-file .env build nginx
              docker compose --env-file .env up -d --no-deps --force-recreate nginx
            else
              echo "Skipping nginx rebuild — no relevant changes"
            fi

            docker compose ps
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            cd ~/meme_bot
            echo "=== Container status ==="
            docker compose ps
            echo ""
            echo "=== Bot (prod) logs ==="
            docker compose logs --tail=10 bot
          ENDSSH

  # ── 2b. PREPROD: деплой при push в dev → test.memeinternet.site
  # Запускается на push в dev и при ручном workflow_dispatch с target=preprod.
  # ВАЖНО: prod и preprod делят ОДИН nginx-контейнер (см. nginx.conf и
  # docker-compose.yml). Mini App статика запечена в образ nginx, поэтому
  # обновление фронта preprod = пересборка общего nginx = фронт prod тоже
  # обновится из текущей ветки dev. Это пре-existing архитектура.
  deploy-preprod:
    if: |
      github.ref == 'refs/heads/dev' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'preprod')
    runs-on: ubuntu-latest
    needs: check-bot
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show changed files in this push (informational)
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          echo "before=$BEFORE  after=$AFTER  event=${{ github.event_name }}"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
              && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "── Files changed across the whole push ──"
            git diff --name-only "$BEFORE" "$AFTER" || true
          else
            echo "(no diff base — first push or shallow history)"
          fi

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy project files to server
        # Тот же ~/meme_bot/. Прод-овский .env остаётся на сервере (excluded).
        # webapp-preprod исключаем — фронт preprod собирается отдельным шагом ниже
        # и rsync-ится в свою папку, иначе --delete снёс бы остатки прошлого билда.
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "mkdir -p ~/meme_bot ~/meme_bot/webapp-preprod/dist"
          rsync -avz --delete \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude=".env.preprod" \
            --exclude=".vercel" \
            --exclude="__pycache__" \
            --exclude="webapp-preprod" \
            ./ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }}:~/meme_bot/

      - name: Set up Node.js (for webapp build)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install bot deps & build Mini App (preprod)
        working-directory: bot
        run: |
          npm ci
          npm run webapp:build

      - name: Rsync preprod Mini App static to server
        # Кладём именно в ту папку, которую nginx маунтит как /usr/share/nginx/miniapp-preprod.
        # --delete чтобы убирать старые ассеты с прошлого билда.
        run: |
          rsync -avz --delete \
            bot/webapp/dist/ \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }}:~/meme_bot/webapp-preprod/dist/

      - name: Create .env.preprod on server
        env:
          DOTENV_CONTENT: ${{ secrets.DOTENV_PREPROD }}
        run: |
          if [ -z "${DOTENV_CONTENT}" ]; then
            echo "::error::Secret DOTENV_PREPROD is empty or not set."
            exit 1
          fi
          printf '%s\n' "$DOTENV_CONTENT" | ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "tee ~/meme_bot/.env.preprod ~/meme_bot/bot/.env.preprod > /dev/null"

      - name: Migrate DB, rebuild bot-preprod, refresh nginx mount
        # Идемпотентно: миграция через ALTER ... IF NOT EXISTS, build с layer-cache.
        # Преднамеренно ВСЕГДА делаем полный цикл (без условных регэкспов) —
        # чтобы push в dev гарантированно поднимал тест-стенд.
        #
        # NB: nginx-образ НЕ пересобирается на dev-пуше. Prod-статика остаётся
        # запечённой в образе, preprod-статика приходит через bind-mount, который
        # обновляется в шаге "Rsync preprod Mini App static" выше. Здесь только
        # `up -d` чтобы при первом раскате этого изменения compose подхватил
        # новый volume (./webapp-preprod/dist).
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            set -euo pipefail
            cd ~/meme_bot

            # Прод-овский .env обязателен — иначе docker compose упадёт на интерполяции переменных.
            if [ ! -f .env ]; then
              echo "::error::~/meme_bot/.env (prod) отсутствует. Сначала задеплой prod (push в main)."
              exit 1
            fi

            echo "── Ensure bind-mount target exists ──"
            mkdir -p ~/meme_bot/webapp-preprod/dist

            echo "── Validate compose ──"
            docker compose --env-file .env config > /dev/null

            echo "── Ensure postgres is up ──"
            docker compose --env-file .env up -d postgres
            for i in {1..30}; do
              if docker compose exec -T postgres pg_isready -U "${POSTGRES_USER:-meme}" -d "${POSTGRES_DB:-meme_db}" > /dev/null 2>&1; then
                break
              fi
              [ "$i" -eq 30 ] && { echo "::error::Postgres failed to become ready"; exit 1; }
              sleep 2
            done

            echo "── Run create_tables.sql (idempotent) ──"
            docker compose exec -T postgres psql -v ON_ERROR_STOP=1 \
              -U "${POSTGRES_USER:-meme}" -d "${POSTGRES_DB:-meme_db}" < create_tables.sql

            echo "── Verify HAPP columns exist ──"
            docker compose exec -T postgres psql -U "${POSTGRES_USER:-meme}" -d "${POSTGRES_DB:-meme_db}" -c "
              SELECT 'users.happ_subscription_url' AS col,
                     EXISTS (SELECT 1 FROM information_schema.columns
                             WHERE table_name='users' AND column_name='happ_subscription_url') AS present
              UNION ALL
              SELECT 'servers.supports_happ',
                     EXISTS (SELECT 1 FROM information_schema.columns
                             WHERE table_name='servers' AND column_name='supports_happ');
            "

            echo "── Build & restart bot-preprod ──"
            docker compose --env-file .env build bot-preprod
            docker compose --env-file .env up -d --no-deps bot-preprod

            echo "── Refresh nginx config/volumes (no image rebuild) ──"
            # `up -d` идемпотентен: пересоздаст контейнер только если изменились
            # compose-конфиг (например, новый volume) или nginx.conf bind-mount.
            # Статика preprod подхватывается из bind-mount без reload — файлы
            # читаются на каждый запрос.
            docker compose --env-file .env up -d --no-deps nginx

            sleep 2
            if ! docker ps --format '{{.Names}}' | grep -q '^edge-nginx$'; then
              echo "::error::edge-nginx не запущен. Логи:"
              docker compose logs --tail=40 nginx || true
              echo "Если это первый раскат изменений с bind-mount preprod — проверь, что"
              echo "~/meme_bot/webapp-preprod/dist существует и доступен под docker."
              exit 1
            fi

            echo "── Final container status ──"
            docker compose ps
          ENDSSH

      - name: Health check (preprod)
        run: |
          sleep 5
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            cd ~/meme_bot
            echo "=== bot-preprod status ==="
            docker compose ps bot-preprod
            echo ""
            echo "=== bot-preprod logs ==="
            docker compose logs --tail=30 bot-preprod
            echo ""
            echo "=== HTTP probe test.memeinternet.site ==="
            curl -ksS -o /dev/null -w "HTTPS index: %{http_code}\n" https://test.memeinternet.site/ || true
            curl -ksS -o /dev/null -w "HTTPS /api/health(if any): %{http_code}\n" https://test.memeinternet.site/api/healthz || true
          ENDSSH
