services:
  # ── DB migrator (idempotent schema init) ─────────────────────
  db-migrator:
    image: postgres:16-alpine
    container_name: meme-db-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-meme_secret}
    volumes:
      - ./create_tables.sql:/migrations/create_tables.sql:ro
    command:
      - sh
      - -c
      - >
        psql -h postgres -U ${POSTGRES_USER:-meme} -d ${POSTGRES_DB:-meme_db}
        -v ON_ERROR_STOP=1 -f /migrations/create_tables.sql
    networks:
      - meme-net

  # ── Telegram Bot ──────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: meme-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-meme}:${POSTGRES_PASSWORD:-meme_secret}@postgres:5432/${POSTGRES_DB:-meme_db}"
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    networks:
      - meme-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: miniappvpn-edge-nginx:latest
    container_name: edge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - bot
    networks:
      - meme-net

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meme-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meme_secret}
      POSTGRES_DB: ${POSTGRES_DB:-meme_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meme} -d ${POSTGRES_DB:-meme_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - meme-net

volumes:
  postgres-data:
    name: miniappvpn-postgres-data
    driver: local

networks:
  meme-net:
    driver: bridge
