services:
  # ── DB migrator (idempotent schema init) ─────────────────────
  db-migrator:
    image: postgres:16-alpine
    container_name: meme-db-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-meme_secret}
    volumes:
      - ./create_tables.sql:/migrations/create_tables.sql:ro
    command:
      - sh
      - -c
      - >
        psql -h postgres -U ${POSTGRES_USER:-meme} -d ${POSTGRES_DB:-meme_db}
        -v ON_ERROR_STOP=1 -f /migrations/create_tables.sql
    networks:
      - meme-net

  # ── Telegram Bot (prod, app.memeinternet.site) ───────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: meme-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-meme}:${POSTGRES_PASSWORD:-meme_secret}@postgres:5432/${POSTGRES_DB:-meme_db}"
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    networks:
      - meme-net

  # ── Telegram Bot (preprod, test.memeinternet.site) ───────────
  # Тот же образ и общая БД с prod. Отличается env-файлом (свой
  # BOT_TOKEN и WEBAPP_URL=https://test.memeinternet.site).
  bot-preprod:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: meme-bot-preprod
    restart: unless-stopped
    env_file:
      # required: false — чтобы prod-деплой (push в main) не падал на валидации,
      # когда на сервере ещё нет .env.preprod. Реальный запуск bot-preprod
      # происходит только из preprod-job, который этот файл предварительно создаёт.
      - path: .env.preprod
        required: false
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-meme}:${POSTGRES_PASSWORD:-meme_secret}@postgres:5432/${POSTGRES_DB:-meme_db}"
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    networks:
      - meme-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: miniappvpn-edge-nginx:latest
    container_name: edge-nginx
    restart: unless-stopped
    ports:
      # На VPS часто уже слушает host nginx/apache — см. deploy или задайте в .env:
      # EDGE_HTTP_PORT=8080 EDGE_HTTPS_PORT=8443
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot на хосте: certonly --webroot -w /var/www/certbot (см. nginx.conf /.well-known)
      - /var/www/certbot:/var/www/certbot:ro
      # Mini App preprod: статика собирается в CI (push в dev) и кладётся на хост.
      # Prod-статика остаётся внутри образа (/usr/share/nginx/miniapp), preprod —
      # bind-mount, чтобы push в dev не пересобирал общий образ и не задевал prod.
      # Папка на хосте создаётся CI-шагом `mkdir -p` перед docker compose up.
      - ./webapp-preprod/dist:/usr/share/nginx/miniapp-preprod:ro
    depends_on:
      # Только prod-bot. bot-preprod поднимается отдельно из preprod-job; nginx
      # маршрутизирует на него через docker-DNS (resolver 127.0.0.11) при запросе.
      - bot
    networks:
      - meme-net

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meme-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meme_secret}
      POSTGRES_DB: ${POSTGRES_DB:-meme_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meme} -d ${POSTGRES_DB:-meme_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - meme-net

volumes:
  postgres-data:
    name: miniappvpn-postgres-data
    driver: local

networks:
  meme-net:
    driver: bridge
