  nginx:
    image: nginx:stable-alpine
    container_name: edge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-certs:/etc/nginx/certs:ro
      - ./bot/webapp/dist:/usr/share/nginx/miniapp:ro
    depends_on:
      - bot
    networks:
      - meme-net

