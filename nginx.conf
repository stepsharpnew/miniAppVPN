user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
		'$status $body_bytes_sent "$http_referer" '
		'"$http_user_agent" "$http_x_forwarded_for"';
	access_log /var/log/nginx/access.log main;
	sendfile on;
	keepalive_timeout 65;

	# HTTP → HTTPS (без домена: Host будет IP или то, что передал клиент)
	server {
		listen 80 default_server;
		listen [::]:80 default_server;
		server_name _;
		location / {
			return 301 https://$host$request_uri;
		}
	}

	server {
		listen 443 ssl default_server;
		listen [::]:443 ssl default_server;
		http2 on;
		server_name _;

		# Сертификаты: каталог ./nginx-certs (fullchain.pem + privkey.pem)
        ssl_certificate     /etc/letsencrypt/live/103-31-76-160.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/103-31-76-160.sslip.io/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;

		# Express API бота (API_PORT в контейнере по умолчанию 3001)
		location /api/ {
			proxy_pass http://bot:3001;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# Статика Mini App
		location / {
			root /usr/share/nginx/miniapp;
			try_files $uri /index.html =404;

			# Hashed assets (Vite) — cache long
			location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
				expires 30d;
				add_header Cache-Control "public, immutable";
			}
		}

		# index.html — never cache (so Telegram WebView always gets fresh version)
		location = / {
			root /usr/share/nginx/miniapp;
			try_files /index.html =404;
			add_header Cache-Control "no-store, no-cache, must-revalidate";
		}
	}
}
