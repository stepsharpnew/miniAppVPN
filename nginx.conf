user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
		'$status $body_bytes_sent "$http_referer" '
		'"$http_user_agent" "$http_x_forwarded_for"';
	access_log /var/log/nginx/access.log main;
	sendfile on;
	keepalive_timeout 65;

	# ── HTTP → HTTPS redirect (все хосты) ──
	server {
		listen 80 default_server;
		listen [::]:80 default_server;
		server_name _;
		location / {
			return 301 https://$host$request_uri;
		}
	}

	# ── Telegram Mini App (основной домен) ──
	server {
		listen 443 ssl default_server;
		listen [::]:443 ssl default_server;
		http2 on;
		server_name 103-31-76-160.sslip.io;

		ssl_certificate     /etc/letsencrypt/live/103-31-76-160.sslip.io/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/103-31-76-160.sslip.io/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;

		location /api/ {
			proxy_pass http://bot:3001;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
			proxy_connect_timeout 60s;
			proxy_send_timeout 60s;
			proxy_read_timeout 60s;
		}

		root /usr/share/nginx/miniapp;

		location = /index.html {
			add_header Cache-Control "no-store, no-cache, must-revalidate" always;
			add_header Pragma "no-cache" always;
		}

		location /assets/ {
			expires 1y;
			add_header Cache-Control "public, immutable" always;
		}

		location / {
			try_files $uri /index.html;
		}
	}

	# ── Веб-сайт (поддомен site.) ──
	server {
		listen 443 ssl;
		listen [::]:443 ssl;
		http2 on;
		server_name site.103-31-76-160.sslip.io;

		ssl_certificate     /etc/letsencrypt/live/site.103-31-76-160.sslip.io/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/site.103-31-76-160.sslip.io/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;

		location /api/ {
			proxy_pass http://bot:3001;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_connect_timeout 60s;
			proxy_send_timeout 60s;
			proxy_read_timeout 60s;
		}

		root /usr/share/nginx/website;

		location = /index.html {
			add_header Cache-Control "no-store, no-cache, must-revalidate" always;
			add_header Pragma "no-cache" always;
		}

		location / {
			try_files $uri /index.html;
		}
	}
}
