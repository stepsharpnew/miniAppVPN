user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	# Docker встроенный DNS — резолвим bot в runtime, иначе nginx падает при старте,
	# если имя ещё не доступно (depends_on не ждёт готовности DNS).
	resolver 127.0.0.11 valid=10s ipv6=off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
		'$status $body_bytes_sent "$http_referer" '
		'"$http_user_agent" "$http_x_forwarded_for"';
	access_log /var/log/nginx/access.log main;
	sendfile on;
	keepalive_timeout 65;

	# ── HTTP: Let's Encrypt (webroot на хосте → /var/www/certbot в контейнере) ──
	server {
		listen 80 default_server;
		listen [::]:80 default_server;
		server_name _;
		location ^~ /.well-known/acme-challenge/ {
			root /var/www/certbot;
			default_type "text/plain";
		}
		location / {
			return 301 https://$host$request_uri;
		}
	}

	# ── Telegram Mini App (поддомен app.) ──
	# DNS: A/AAAA для app.memeinternet.site → этот сервер.
	# Сертификат: один SAN на memeinternet.site + www + app (см. .env.example).
	server {
		listen 443 ssl default_server;
		listen [::]:443 ssl default_server;
		http2 on;
		server_name app.memeinternet.site;

		ssl_certificate     /etc/letsencrypt/live/memeinternet.site/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/memeinternet.site/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;

		location /api/ {
			set $bot_upstream http://bot:3001;
			proxy_pass $bot_upstream;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
			proxy_connect_timeout 60s;
			proxy_send_timeout 60s;
			proxy_read_timeout 60s;
		}

		root /usr/share/nginx/miniapp;

		location = /index.html {
			add_header Cache-Control "no-store, no-cache, must-revalidate" always;
			add_header Pragma "no-cache" always;
		}

		location /assets/ {
			expires 1y;
			add_header Cache-Control "public, immutable" always;
		}

		location / {
			try_files $uri /index.html;
		}
	}

	# ── Публичный сайт (apex + www) ──
	# DNS: A/AAAA для memeinternet.site и www.memeinternet.site → этот сервер.
	server {
		listen 443 ssl;
		listen [::]:443 ssl;
		http2 on;
		server_name memeinternet.site www.memeinternet.site;

		ssl_certificate     /etc/letsencrypt/live/memeinternet.site/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/memeinternet.site/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;

		location /api/ {
			set $bot_upstream http://bot:3001;
			proxy_pass $bot_upstream;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_connect_timeout 60s;
			proxy_send_timeout 60s;
			proxy_read_timeout 60s;
		}

		root /usr/share/nginx/website;

		location = /index.html {
			add_header Cache-Control "no-store, no-cache, must-revalidate" always;
			add_header Pragma "no-cache" always;
		}

		location / {
			try_files $uri /index.html;
		}
	}
}
