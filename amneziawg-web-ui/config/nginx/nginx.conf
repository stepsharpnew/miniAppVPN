# Load the stream module (installed via nginx-mod-stream in Alpine).
# Required for port-443 SNI-based routing (REALITY whitelist bypass).
load_module /usr/lib/nginx/modules/ngx_stream_module.so;

user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    sendfile    on;
    keepalive_timeout 65;
    gzip on;

    include /etc/nginx/http.d/*.conf;
}

# Port 443 SNI-based routing for VLESS+REALITY whitelist bypass.
# When SSL is configured, this file contains a stream{} block that routes:
#   - REALITY mask domain SNI  ->  Xray inbound (internal port, no host exposure needed)
#   - Everything else          ->  nginx HTTPS on internal port 4443
# The file is initially a comment only; updated by start.sh (SSL) and the web UI (REALITY servers).
include /etc/nginx/stream_reality.conf;
