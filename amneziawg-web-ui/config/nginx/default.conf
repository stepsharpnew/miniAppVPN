server {
    listen 80;
    server_name _;

    set_real_ip_from 172.17.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    
    # Root directory for static files
    root /app/web-ui;
    index index.html;

    # Serve static files
    location /static/ {
        alias /app/web-ui/static/;
        # Always revalidate static assets — the browser still caches via ETag
        # (304 Not Modified on unchanged files), but never serves a stale copy
        # after a deploy. Without this, "immutable" pinned old app.js even after
        # rebuilds, breaking newly added UI features (loadUsers, registerSatellite, …).
        add_header Cache-Control "no-cache";
        etag on;
    }

    # Proxy to Flask application
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        auth_basic "Restricted Content";
        auth_basic_user_file /etc/nginx/.htpasswd;
        # ALLOW_RULES_START
        # ALLOW_RULES_END
    }

    # VLESS (xray) dynamic locations (generated by Web UI)
    include /etc/nginx/vless_locations.inc;

    # Federation: satellite-mode endpoints called from a remote hub.
    # These are authenticated by Flask via the Bearer SATELLITE_API_KEY
    # header — basic-auth would force the hub to also know this VPS's nginx
    # admin password, which is an unnecessary extra secret. Defined BEFORE
    # the generic /api/ block so its longer prefix wins.
    location /api/satellite/ {
        proxy_pass http://127.0.0.1:5000/api/satellite/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # No auth_basic here — Flask checks SATELLITE_API_KEY itself.
        # If SATELLITE_API_KEY isn't set on this VPS, Flask returns 403.
    }

    # Subscription endpoints handed out to end users (HAPP / v2rayN / Hiddify).
    # The client apps don't send an Authorization header when fetching the
    # subscription URL, so basic-auth would surface as a 401 in the app and the
    # user would never see the server list. Authentication is the unguessable
    # token in the path itself (24 random bytes ≈ 192 bits of entropy).
    location /api/sub/ {
        proxy_pass http://127.0.0.1:5000/api/sub/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        auth_basic "Restricted Content";
        auth_basic_user_file /etc/nginx/.htpasswd;
        # ALLOW_RULES_START
        # ALLOW_RULES_END
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # CRITICAL: Include the original Host header with port
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket specific settings
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
        
        auth_basic "Restricted Content";
        auth_basic_user_file /etc/nginx/.htpasswd;
        # ALLOW_RULES_START
        # ALLOW_RULES_END
    }

    location /status {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:5000/status;
    }
}
